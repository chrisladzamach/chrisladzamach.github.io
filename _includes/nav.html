<header class="topbar">
  <div class="topbar__container">
    <button class="topbar__menu-toggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="sidebar" data-menu-toggle>
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="topbar__nav" aria-label="Navegación principal">
      <ul class="topbar__menu">
        {% assign home_url = '/' | relative_url %}
        {% assign current_url = page.url | remove: 'index.html' %}
        {% if current_url == '' %}{% assign current_url = '/' %}{% endif %}

        <li>
          <a class="topbar__link{% if current_url == home_url %} topbar__link--active{% endif %}" href="{{ home_url }}">
            Home
          </a>
        </li>
        <li>
          <a class="topbar__link{% if current_url == '/articulos-tecnicos/' %} topbar__link--active{% endif %}" href="{{ '/articulos-tecnicos/' | relative_url }}">
            Artículos técnicos
          </a>
        </li>
        <li>
          <a class="topbar__link{% if current_url == '/articulos-personales/' %} topbar__link--active{% endif %}" href="{{ '/articulos-personales/' | relative_url }}">
            Artículos personales
          </a>
        </li>
      </ul>
    </nav>

    <button class="search-toggle" type="button" aria-label="Abrir buscador" data-search-toggle>
      {% include icon.html name='search' %}
    </button>
  </div>
</header>
