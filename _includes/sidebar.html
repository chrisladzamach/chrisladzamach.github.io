<aside class="sidebar" role="banner" aria-label="Perfil del autor">
  <div class="sidebar__inner">
    <a href="{{ '/' | relative_url }}" class="sidebar__brand" aria-label="Ir al inicio">
      <img
        src="{{ site.author.avatar | relative_url }}"
        alt="Foto de perfil de {{ site.author.name | escape }}"
        class="sidebar__avatar"
        width="120"
        height="120"
        loading="eager">
      <h1 class="sidebar__name">{{ site.author.name | escape }}</h1>
    </a>

    <p class="sidebar__bio">{{ site.author.bio | escape }}</p>

    {% if site.author.location %}
    <p class="sidebar__location">
      <span class="sidebar__icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
      </span>
      {{ site.author.location | escape }}
    </p>
    {% endif %}

    <nav class="sidebar__social" aria-label="Enlaces de contacto">
      <ul>
        {% for link in site.author.links %}
        <li>
          <a href="{{ link.url }}" target="_blank" rel="noopener noreferrer" aria-label="{{ link.label | escape }}">
            <span class="sidebar__icon" aria-hidden="true">
              {% include icon.html name=link.icon %}
            </span>
            {{ link.label | escape }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</aside>
