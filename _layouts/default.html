<!DOCTYPE html>
<html lang="{{ site.lang | default: 'es' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 | escape }}">
  <link rel="canonical" href="{{ page.url | replace: 'index.html', '' | absolute_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo title=false %}
  {% feed_meta %}
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <div class="site-wrapper">
    {% include sidebar.html %}

    <div class="main-area">
      {% include nav.html %}

      <main id="main-content" class="content" tabindex="-1">
        {{ content }}
      </main>

      {% include footer.html %}
    </div>
  </div>

  {% include search.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
